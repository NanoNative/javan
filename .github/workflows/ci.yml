name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'workflow/**'
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-24.04
          - target: linux-aarch64
            os: ubuntu-24.04-arm
          - target: macos-aarch64
            os: macos-15
          - target: macos-x64
            os: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Install Linux native toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Verify Maven suite
        run: mvn -q verify

      - name: Verify acceptance suite
        run: sh .github/scripts/acceptance.sh

      - name: Verify host target build
        run: java -cp target/classes javan.Main build src/test/resources/projects/acceptance/hello --target ${{ matrix.target }} --output hello-${{ matrix.target }}

      - name: Verify sanitizer smoke
        run: JAVAN_SANITIZER_REQUIRED=true sh .github/scripts/sanitizer-suite.sh

      - name: Verify self-host jar path
        run: java -cp target/classes javan.Main build target/classes --main javan.Main --jar --output javan
