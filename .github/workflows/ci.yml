name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-24.04
          - target: linux-aarch64
            os: ubuntu-24.04-arm
          - target: macos-aarch64
            os: macos-15
          - target: macos-x64
            os: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Verify binding toolchains
        run: |
          go version
          rustc --version

      - name: Install Linux native toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Verify Maven suite
        run: mvn -q verify

      - name: Verify acceptance suite
        run: sh .github/scripts/acceptance.sh

      - name: Verify host target build
        run: java -cp target/classes javan.Main build src/test/resources/projects/acceptance/hello --target ${{ matrix.target }} --output hello-${{ matrix.target }}

      - name: Verify sanitizer smoke
        run: JAVAN_SANITIZER_REQUIRED=true sh .github/scripts/sanitizer-suite.sh

      - name: Verify self-host package smoke
        run: JAVAN_PACKAGE_TARGET='${{ matrix.target }}' sh .github/scripts/verify-ci-package-smoke.sh
