name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-24.04
            sanitizer-scope: full
          - target: linux-aarch64
            os: ubuntu-24.04-arm
            sanitizer-scope: platform-smoke
          - target: macos-aarch64
            os: macos-15
            sanitizer-scope: full
          - target: macos-x64
            os: macos-15-intel
            sanitizer-scope: full

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Verify binding toolchains
        run: |
          go version
          rustc --version

      - name: Install Linux native toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential mingw-w64

      - name: Verify Maven suite
        run: |
          mvn -q verify || {
            python3 - <<'PY'
            import pathlib
            import xml.etree.ElementTree as ET

            report = pathlib.Path("target/site/jacoco/jacoco.xml")
            if not report.exists():
                print("JaCoCo report missing after failed verify.")
            else:
                root = ET.parse(report).getroot()
                bundle = {counter.attrib["type"]: counter.attrib for counter in root.findall("counter")}
                for counter_type in ("BRANCH", "LINE"):
                    counter = bundle.get(counter_type)
                    if counter is None:
                        continue
                    missed = int(counter["missed"])
                    covered = int(counter["covered"])
                    total = missed + covered
                    ratio = covered / total if total else 1.0
                    print(f"JaCoCo {counter_type.lower()} bundle ratio: {covered}/{total} = {ratio:.6%}")
            PY
            exit 1
          }

      - name: Verify acceptance suite
        run: sh .github/scripts/acceptance.sh

      - name: Verify host target build
        run: java -cp target/classes javan.Main build src/test/resources/projects/acceptance/hello --target ${{ matrix.target }} --output hello-${{ matrix.target }}

      - name: Verify sanitizer smoke
        run: >-
          JAVAN_SANITIZER_REQUIRED=true
          JAVAN_SANITIZER_SCOPE='${{ matrix.sanitizer-scope }}'
          sh .github/scripts/sanitizer-suite.sh

      - name: Verify self-host package smoke
        run: >-
          JAVAN_PACKAGE_TARGET='${{ matrix.target }}'
          JAVAN_PACKAGE_SANITIZER_SCOPE='${{ matrix.sanitizer-scope }}'
          sh .github/scripts/verify-ci-package-smoke.sh

  windows-runtime-smoke:
    name: windows-runtime-smoke
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: |
          git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set up MSYS2 toolchain
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Windows C compiler
        shell: pwsh
        run: |
          gcc --version

      - name: Verify Windows runtime smoke
        env:
          CC: ${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin\\gcc.exe
        run: >-
          mvn -q
          '-Dtest=javan.codegen.RuntimeFilesTest#'
          test
