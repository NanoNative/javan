name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-24.04
          - target: linux-aarch64
            os: ubuntu-24.04-arm
          - target: macos-aarch64
            os: macos-15
          - target: macos-x64
            os: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Verify binding toolchains
        run: |
          go version
          rustc --version

      - name: Install Linux native toolchain
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential mingw-w64

      - name: Verify Maven suite
        run: mvn -q verify

      - name: Verify acceptance suite
        run: sh .github/scripts/acceptance.sh

      - name: Verify host target build
        run: java -cp target/classes javan.Main build src/test/resources/projects/acceptance/hello --target ${{ matrix.target }} --output hello-${{ matrix.target }}

      - name: Verify sanitizer smoke
        run: JAVAN_SANITIZER_REQUIRED=true sh .github/scripts/sanitizer-suite.sh

      - name: Verify self-host package smoke
        run: JAVAN_PACKAGE_TARGET='${{ matrix.target }}' sh .github/scripts/verify-ci-package-smoke.sh

  windows-runtime-smoke:
    name: windows-runtime-smoke
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Enable Git long paths
        shell: pwsh
        run: |
          git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Set up MSYS2 toolchain
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "${{ steps.msys2.outputs.msys2-location }}\\mingw64\\bin" |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Windows C compiler
        shell: pwsh
        run: |
          gcc --version

      - name: Verify Windows runtime smoke
        run: >-
          mvn -q
          -Dtest=javan.codegen.RuntimeFilesTest#
          test
