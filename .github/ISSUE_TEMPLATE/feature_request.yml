name: Feature request
description: Propose a focused capability or compatibility improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        javan keeps native code generation explicit and deterministic. Please describe the user-visible need first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what blocks you today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Static profile
        - Bytecode compatibility
        - C/native code generation
        - Library output or bindings
        - Toolchain detection
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Example input or workflow
      description: Include sample Java source, commands, or expected generated output when useful.
      render: text
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any workarounds or smaller options.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues for related requests.
          required: true
        - label: This request does not require adding or changing project licensing.
          required: true
